<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <title>Academic homepage</title>
    <link rel="stylesheet" href="/assets/css/site.css">
    <script defer src="/assets/js/site.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="#home" data-brand-link>
        <span class="brand-mark" data-brand-mark aria-hidden="true"></span>
        <span class="brand-name" data-profile="name"></span>
      </a>
      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="#news" data-nav-news hidden></a>
        <a href="#research" data-nav-research hidden></a>
        <a href="#publications" data-nav-publications hidden></a>
        <a href="#writing" data-nav-writing hidden></a>
      </nav>
    </header>

    <main id="main">
      <section class="hero" id="home" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow" data-home="heroEyebrow"></p>
          <h1 id="hero-title">
            <span data-profile="name"></span>
            <span class="native-name" data-profile="nativeName"></span>
          </h1>
          <p class="lead" data-home="heroDescription"></p>
          <div class="hero-socials" data-hero-socials>
            <a class="social-link" href="#" data-email-link data-tooltip="Email" aria-label="Email" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="m3 7 9 6 9-6"></path>
              </svg>
            </a>
            <a class="social-link" href="#" data-github-link data-tooltip="GitHub" aria-label="GitHub" rel="me noopener" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true" class="brand-icon">
                <path d="M12 .7a11.5 11.5 0 0 0-3.64 22.41c.58.11.79-.25.79-.56v-2.23c-3.22.7-3.9-1.37-3.9-1.37-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.71.08-.71 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.72 1.27 3.38.97.1-.75.4-1.27.74-1.56-2.57-.29-5.27-1.29-5.27-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.47.11-3.05 0 0 .97-.31 3.16 1.18a10.9 10.9 0 0 1 5.76 0c2.19-1.49 3.16-1.18 3.16-1.18.63 1.58.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.41-2.71 5.39-5.28 5.68.42.36.78 1.06.78 2.14v3.17c0 .31.21.68.8.56A11.5 11.5 0 0 0 12 .7Z"></path>
              </svg>
            </a>
            <a class="social-link" href="#" data-linkedin-link data-tooltip="LinkedIn" aria-label="LinkedIn" rel="me noopener" hidden>
              <span class="social-wordmark" aria-hidden="true">in</span>
            </a>
            <a class="social-link social-link-orcid" href="#" data-orcid-link data-tooltip="ORCID" aria-label="ORCID" rel="me noopener" hidden>
              <span class="social-wordmark" aria-hidden="true">iD</span>
            </a>
            <a class="social-link" href="#" data-google-scholar-link data-tooltip="Google Scholar" aria-label="Google Scholar" rel="me noopener" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m3 10 9-5 9 5-9 5-9-5Z"></path>
                <path d="M7 12.8V17c2.8 2.2 7.2 2.2 10 0v-4.2"></path>
              </svg>
            </a>
          </div>
        </div>

        <div class="research-mark" data-research-mark>
          <div class="mark-frame" aria-hidden="true">
            <span class="mark-initials" data-brand-mark></span>
            <span class="mark-axis mark-axis-a"></span>
            <span class="mark-axis mark-axis-b"></span>
            <span class="mark-node mark-node-a"></span>
            <span class="mark-node mark-node-b"></span>
            <span class="mark-node mark-node-c"></span>
          </div>
          <div class="mark-caption" id="research-mark-caption"></div>
        </div>
      </section>

      <section class="section summary-section" aria-labelledby="summary-title">
        <div class="section-heading">
          <p class="section-kicker" data-home="summaryKicker"></p>
          <h2 id="summary-title" data-home="summaryTitle"></h2>
        </div>
        <p class="summary-copy" data-home="summaryDescription"></p>
      </section>

      <section class="section" id="news" data-section="news" aria-labelledby="news-title" hidden>
        <div class="section-heading">
          <p class="section-kicker" data-home="newsKicker"></p>
          <h2 id="news-title" data-home="newsTitle"></h2>
        </div>
        <div class="news-list" id="news-list"></div>
      </section>

      <section class="section" id="research" data-section="research" aria-labelledby="research-title" hidden>
        <div class="section-heading">
          <p class="section-kicker" data-home="researchKicker"></p>
          <h2 id="research-title" data-home="researchTitle"></h2>
        </div>
        <div class="interest-grid" id="research-list"></div>
      </section>

      <section class="section" id="publications" data-section="publications" aria-labelledby="publications-title" hidden>
        <div class="section-heading">
          <p class="section-kicker" data-home="publicationsKicker"></p>
          <h2 id="publications-title" data-home="publicationsTitle"></h2>
        </div>
        <div class="publication-list" id="publication-list"></div>
      </section>

      <section class="section" id="writing" data-section="writing" aria-labelledby="writing-title" hidden>
        <div class="section-heading">
          <p class="section-kicker" data-home="writingKicker"></p>
          <h2 id="writing-title" data-home="writingTitle"></h2>
        </div>
        <div class="writing-list" id="writing-list"></div>
        <div class="section-actions" data-writing-actions hidden>
          <a class="button button-secondary" href="/posts/" data-writing-archive-link></a>
        </div>
      </section>

      <section class="section resources-section" id="resources" data-section="resources" aria-labelledby="resources-title" hidden>
        <div class="section-heading">
          <p class="section-kicker" data-home="resourcesKicker"></p>
          <h2 id="resources-title" data-home="resourcesTitle"></h2>
        </div>
        <div class="resource-list" id="resource-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        <span data-profile="name"></span>
        <span aria-hidden="true">/</span>
        <span data-profile="location"></span>
      </p>
    </footer>
  </body>
</html>
