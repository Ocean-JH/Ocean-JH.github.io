<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Notes</title>
    <link rel="stylesheet" href="/assets/css/site.css">
    <script defer src="/assets/js/posts.js"></script>
  </head>
  <body data-page="posts-index">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="/" data-brand-link>
        <span class="brand-mark" data-brand-mark aria-hidden="true"></span>
        <span class="brand-name" data-profile="name"></span>
      </a>
      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="/#news" data-nav-news hidden></a>
        <a href="/#research" data-nav-research></a>
        <a href="/posts/" data-nav-writing aria-current="page"></a>
      </nav>
    </header>

    <main class="page-shell" id="main">
      <section class="post-hero" aria-labelledby="posts-title">
        <p class="eyebrow" data-posts-page="eyebrow"></p>
        <h1 id="posts-title" data-posts-page="heading"></h1>
        <p class="lead" data-posts-page="introduction"></p>
      </section>

      <section class="post-toolbar" data-post-toolbar>
        <label class="search-box">
          <span data-posts-page="searchLabel"></span>
          <input id="post-search" type="search">
        </label>
        <div class="tag-filter" id="tag-filter"></div>
      </section>

      <section class="post-archive" aria-labelledby="archive-title">
        <div class="section-heading">
          <p class="section-kicker" data-posts-page="archiveKicker"></p>
          <h2 id="archive-title" data-posts-page="archiveTitle"></h2>
        </div>
        <div class="post-archive-list" id="post-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        <span data-profile="name"></span>
        <span aria-hidden="true">/</span>
        <span data-profile="location"></span>
      </p>
    </footer>
  </body>
</html>
