<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Note</title>
    <link rel="stylesheet" href="/assets/css/site.css">
    <script defer src="/assets/js/posts.js"></script>
  </head>
  <body data-page="post-reader">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="/" data-brand-link>
        <span class="brand-mark" data-brand-mark aria-hidden="true"></span>
        <span class="brand-name" data-profile="name"></span>
      </a>
      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="/#news" data-nav-news hidden></a>
        <a href="/#research" data-nav-research></a>
        <a href="/posts/" data-nav-writing></a>
      </nav>
    </header>

    <main class="page-shell" id="main">
      <article class="post-reader">
        <a class="back-link" href="/posts/" data-post-page="backLabel"></a>
        <header class="post-reader-header">
          <p class="section-kicker" id="post-topic"></p>
          <h1 id="post-title"></h1>
          <div class="item-meta" id="post-meta"></div>
        </header>
        <div class="post-body" id="post-body" aria-live="polite"></div>
      </article>
    </main>

    <footer class="site-footer">
      <p>
        <span data-profile="name"></span>
        <span aria-hidden="true">/</span>
        <span data-profile="location"></span>
      </p>
    </footer>
  </body>
</html>
